{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-md border border-gray-100 mt-10">
    <h2 class="text-2xl font-bold text-gray-800 text-center mb-6">Client Registration</h2>
    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-semibold text-gray-600 mb-1">Email Address</label>
            <input type="email" name="email" required class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-600 mb-1">Phone Number</label>
            <input type="text" name="phone_number" placeholder="+256..." required class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-600 mb-1">Password</label>
            <input type="password" name="password" required class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold p-2.5 rounded-lg transition shadow">Register Account</button>
    </form>
    <p class="text-sm text-center text-gray-500 mt-4">Already registered? <a href="{{ url_for('login') }}" class="text-indigo-600 hover:underline">Login here</a></p>
</div>
{% block content %}
