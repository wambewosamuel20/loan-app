{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-md border border-gray-100 mt-10">
    <h2 class="text-2xl font-bold text-gray-800 text-center mb-6">Welcome Back</h2>
    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-semibold text-gray-600 mb-1">Email Address</label>
            <input type="email" name="email" required class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-600 mb-1">Password</label>
            <input type="password" name="password" required class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold p-2.5 rounded-lg transition shadow">Sign In</button>
    </form>
    <p class="text-sm text-center text-gray-500 mt-4">New client? <a href="{{ url_for('register') }}" class="text-indigo-600 hover:underline">Create account</a></p>
</div>
{% endblock %}
